# docker-compose.yml (開発用)

services:
  db-init:
    build:
      context: .
      dockerfile: ./backend/api_gateway/Dockerfile
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./script:/app/script
    command: ["python", "/app/script/init_db.py"]
    depends_on:
      db:
        condition: service_healthy
  # --- API Gateway ---
  api_gateway:
    build:
      context: .
      dockerfile: ./backend/api_gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # 開発中はソースコードの変更を即時反映させる
      - ./backend/api_gateway:/app/api_gateway
      - ./backend/shared:/app/shared
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # --- Worker ---
  worker:
    build:
      context: .
      dockerfile: ./backend/worker/Dockerfile
    env_file: .env
    volumes:
      # 開発中はソースコードの変更を即時反映させる
      - ./backend/worker:/app/worker
      - ./backend/shared:/app/shared
      - ./backend/worker/data/vectorstore_knowledge:/app/worker/data/vectorstore_knowledge
      - ./backend/worker/data/vectorstore_memory:/app/worker/data/vectorstore_memory
      - ./script:/app/script
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
      neo4j: # ★★★ Neo4jへの依存を追加 ★★★
        condition: service_healthy # ★★★ Neo4jが健康状態になるまで待つことを明示 ★★★
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --- Ollama ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --- Redis ---
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Database ---
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 15s      # 確認の間隔を15秒に
      timeout: 10s       # タイムアウトを10秒に
      retries: 10        # リトライ回数を10回に
      start_period: 60s  # 起動後、最初の60秒はチェックを待つ
  
  neo4j:
    image: neo4j:5.20.0-community # または最新の安定版 image: neo4j:latest
    hostname: neo4j
    container_name: oc_guidancellm-neo4j-1 # コンテナ名を分かりやすく
    ports:
      - "7474:7474" # Neo4j Browser (Web UI)
      - "7687:7687" # Bolt port (Pythonドライバー用)
    volumes:
      - neo4j_data:/data # データの永続化用ボリューム
      - ./neo4j_plugins:/plugins # 必要に応じてプラグイン用
    environment:
      - NEO4J_AUTH=neo4j/password # ユーザー名/パスワード (本番環境ではより強力なパスワードを設定)
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes # ライセンス同意（必須）
      # メモリ設定 (システムのメモリに合わせて調整)
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    healthcheck: # ★★★ Neo4jのヘルスチェックを必ず追加 ★★★
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"] # HTTPポートをチェック
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # 起動期間中はこのヘルスチェックを待つ
  
# --- Frontend (開発用) ---
  frontend:
    # frontendプロジェクトのルートディレクトリをビルドコンテキストとして指定
    build:
      context: ./frontend
      dockerfile: Dockerfile # frontend/OC_guidanceLLM/Dockerfile を参照
    ports:
      # ホストの5173番ポートをコンテナの5173番に接続 (Viteのデフォルト)
      - "5173:5173" 
    volumes:
      # ソースコードの変更を即時反映させる
      - ./frontend/OC_guidanceLLM:/app # ★★★ ここを修正 ★★★
      # node_modulesはホストと共有しない(パフォーマンスと環境差異のため)
      - /app/node_modules
    depends_on:
      # API Gatewayが起動してからフロントエンドを起動する
      api_gateway: # ★★★ サービス名のみでOK ★★★
        condition: service_started # API Gatewayが起動するまで待つ

volumes:
  db_data:
  ollama_data:
  neo4j_data:


